<!doctype html>
<html>
  <head>
    <title>Document</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- css link -->
    <link rel="stylesheet" href="style.css">
    <!-- tailwindCss cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- axios cdn -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Font Awesome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-96 text-center">
      <h1 class="font-bold mb-6 text-gray-800 text-2xl underline underline-offset-6">Weather App</h1>

      <div class="flex gap-2 mb-6">
        
        <input type="text" id="cityInput" placeholder="Enter a City Name" class="w-full border-2 rounded p-2 outline-none focus:ring-2 focus:ring-indigo-300 focus:border-transparent border-gray-300">

        <button id="searchBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded transition duration-200 ease-in-out cursor-pointer">Search</button>
      </div>

      <div id="weatherInfo" class="hidden">

        <h2 id="cityName" class="text-xl font-semibold text-gray-700">City Name</h2>
        <p id="temp" class="text-4xl font-bold my-5 text-blue-500 ">0°C</p>
        <p id="description" class="text-gray-500 capitalize">Weather Condition</p>
      </div>

      <p id="message" class="text-red-500 mt-4"></p>
    </div>
  
  




    <script src="./app.js"></script>
  </body>
</html>
